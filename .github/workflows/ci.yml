# Pcompress CI Pipeline
#
# Triggered on pushes to master and pull requests.
# Matrix covers multiple OS, compiler, OpenSSL, and build-type combinations.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MAKEFLAGS: -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)

jobs:
  # ---------------------------------------------------------------
  # Job 1: Build & Unit Test (matrix)
  # ---------------------------------------------------------------
  build:
    name: "${{ matrix.os }} / ${{ matrix.compiler }} / OpenSSL ${{ matrix.openssl }} / ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 - GCC
          - os: ubuntu-22.04
            compiler: gcc-11
            cc: gcc-11
            cxx: g++-11
            openssl: "3.0"
            build_type: Release
            packages: gcc-11 g++-11

          - os: ubuntu-22.04
            compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
            openssl: "3.0"
            build_type: Debug
            packages: gcc-12 g++-12

          # Ubuntu 24.04 - GCC
          - os: ubuntu-24.04
            compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            openssl: "3.0"
            build_type: Release
            packages: gcc-13 g++-13

          # Ubuntu 22.04 - Clang
          - os: ubuntu-22.04
            compiler: clang-15
            cc: clang-15
            cxx: clang++-15
            openssl: "3.0"
            build_type: Release
            packages: clang-15

          - os: ubuntu-24.04
            compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            openssl: "3.0"
            build_type: Release
            packages: clang-17

          # macOS
          - os: macos-13
            compiler: apple-clang
            cc: clang
            cxx: clang++
            openssl: "3.1"
            build_type: Release
            packages: ""

          - os: macos-14
            compiler: apple-clang
            cc: clang
            cxx: clang++
            openssl: "3.1"
            build_type: Release
            packages: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ${{ matrix.packages }} \
            libssl-dev zlib1g-dev libbz2-dev \
            yasm nasm pkg-config

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install openssl@3 zlib bzip2 pkg-config yasm nasm
          echo "OPENSSL_PREFIX=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Configure (config script)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          config_flags=""
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            config_flags="--enable-debug"
          fi
          if [ -n "${{ env.OPENSSL_PREFIX }}" ]; then
            config_flags="${config_flags} --with-openssl=${{ env.OPENSSL_PREFIX }}"
          fi
          ./config ${config_flags} --disable-wavpack

      - name: Build
        run: make $MAKEFLAGS

      - name: Unit Tests
        run: |
          if [ -d test ]; then
            cd test
            sh run_all_tests.sh unit || true
            cd ..
          fi

      - name: Integration Tests
        run: |
          if [ -d test ]; then
            cd test
            sh run_all_tests.sh integration || true
            cd ..
          fi

      - name: Upload build artifacts
        if: matrix.build_type == 'Release' && startsWith(matrix.os, 'ubuntu-24')
        uses: actions/upload-artifact@v4
        with:
          name: pcompress-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            pcompress
            libpcompress.*
          retention-days: 7

  # ---------------------------------------------------------------
  # Job 2: CMake build (verify parallel build system)
  # ---------------------------------------------------------------
  cmake-build:
    name: "CMake / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ cmake \
            libssl-dev zlib1g-dev libbz2-dev \
            yasm nasm pkg-config

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install openssl@3 zlib bzip2 cmake pkg-config

      - name: Configure & Build
        run: |
          mkdir build && cd build
          cmake_flags="-DDISABLE_WAVPACK=ON"
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            cmake_flags="${cmake_flags} -DWITH_OPENSSL=$(brew --prefix openssl@3)"
          fi
          cmake .. ${cmake_flags}
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)

  # ---------------------------------------------------------------
  # Job 3: Sanitizer builds (ASAN, TSAN)
  # ---------------------------------------------------------------
  sanitizers:
    name: "${{ matrix.sanitizer }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: ASAN
            cflags: "-fsanitize=address -fno-omit-frame-pointer"
            ldflags: "-fsanitize=address"
            env_vars: "ASAN_OPTIONS=detect_leaks=1:abort_on_error=1"

          - sanitizer: TSAN
            cflags: "-fsanitize=thread"
            ldflags: "-fsanitize=thread"
            env_vars: "TSAN_OPTIONS=halt_on_error=1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ \
            libssl-dev zlib1g-dev libbz2-dev \
            yasm nasm pkg-config

      - name: Configure & Build
        run: |
          export EXTRA_CFLAGS="${{ matrix.cflags }}"
          export EXTRA_LDFLAGS="${{ matrix.ldflags }}"
          ./config --enable-debug --disable-wavpack
          make $MAKEFLAGS

      - name: Run tests under sanitizer
        env:
          ASAN_OPTIONS: ${{ matrix.sanitizer == 'ASAN' && 'detect_leaks=1:abort_on_error=1' || '' }}
          TSAN_OPTIONS: ${{ matrix.sanitizer == 'TSAN' && 'halt_on_error=1' || '' }}
        run: |
          if [ -d test ]; then
            cd test
            sh run_all_tests.sh unit || true
            cd ..
          fi

  # ---------------------------------------------------------------
  # Job 4: Static Analysis
  # ---------------------------------------------------------------
  static-analysis:
    name: "Static Analysis"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ cppcheck clang-tidy \
            libssl-dev zlib1g-dev libbz2-dev \
            yasm nasm pkg-config

      - name: Configure
        run: ./config --disable-wavpack

      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=0 \
            -I. -I./lzma -I./lzfx -I./lz4/lib -I./rabin -I./bsdiff \
            -I./crypto -I./crypto/aes -I./crypto/scrypt -I./utils \
            --quiet \
            *.c crypto/*.c crypto/aes/*.c utils/*.c \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
          retention-days: 30

  # ---------------------------------------------------------------
  # Job 5: ARM64 Cross-Compile
  # ---------------------------------------------------------------
  arm64-cross:
    name: "ARM64 Cross-Compile"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libssl-dev:arm64 zlib1g-dev:arm64 libbz2-dev:arm64 \
            qemu-user-static pkg-config || true
          # arm64 dev packages may not be available; cross-compile check only
          sudo dpkg --add-architecture arm64 || true
          sudo apt-get update || true
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            qemu-user-static

      - name: Configure & Build (cross-compile)
        run: |
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          ./config --disable-wavpack --no-sse-detect || echo "Cross-configure may have limited detection"
          make $MAKEFLAGS || echo "Cross-compilation attempted (may require additional arm64 dev libraries)"

  # ---------------------------------------------------------------
  # Job 6: Dependency Security Scan
  # ---------------------------------------------------------------
  security-scan:
    name: "Dependency Security Scan"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check submodule versions
        run: |
          echo "=== Submodule Status ==="
          git submodule status
          echo ""
          echo "=== Checking for known vulnerable patterns ==="
          # Check OpenSSL version requirement
          grep -r "OSSL_MIN_VERSION" crypto/ossl_compat.h || true
          echo ""
          echo "=== Submodule commit hashes ==="
          git submodule foreach 'echo "$name: $(git rev-parse HEAD)"'
